name = "ai-tools"
main = ".output/server/index.mjs"
compatibility_date = "2025-12-31"

[vars]
# Add non-secret variables here.
# Set secrets with:
#   wrangler secret put NUXT_OPENAI_API_KEY
#   wrangler secret put NUXT_ANTHROPIC_API_KEY
#   wrangler secret put NUXT_MIYAKO_VECTOR_STORE_ID

[[d1_databases]]
binding = "WHISPER_DB"
database_name = "whisper-db"
database_id = "a89cb679-8a17-4d46-9c90-dada3e35691b"
# 初回セットアップ:
#   wrangler d1 create whisper-db
#   wrangler d1 execute whisper-db --file src/server/db/001_auth.sql

[[d1_databases]]
binding = "MLB_DB"
database_name = "mlb-db"
database_id = "7698b7b5-b0c8-4289-b19e-a99c669ca75f"
# 初回セットアップ:
#   wrangler d1 create mlb-db
#   wrangler d1 execute mlb-db --file src/server/db/mlb-schema.sql

[[d1_databases]]
binding = "DEEPHEART_DB"
database_name = "deepheart-db"
database_id = "afcdcced-79d2-4f3a-a0c5-bf86a21731a4"
# 初回セットアップ:
#   wrangler d1 create deepheart-db
#   wrangler d1 execute deepheart-db --file src/server/db/003_deepheart.sql

# Cron Trigger（6時間ごと・4回/日）
[triggers]
crons = ["0 0 * * *", "0 6 * * *", "0 12 * * *", "0 18 * * *"]

[build]
command = "npm run build"

[assets]
directory = ".output/public"

