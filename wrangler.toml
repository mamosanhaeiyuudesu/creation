name = "ai-tools"
main = ".output/server/index.mjs"
compatibility_date = "2025-12-31"

[vars]
# Add non-secret variables here. Set the API key with: wrangler secret put OPENAI_API_KEY

[[d1_databases]]
binding = "DB"
database_name = "tasks-db"
database_id = "379f07c2-e5f1-4406-bd8d-3f7587a5bdc6"
# Run: wrangler d1 create tasks-db  to get the database_id

[build]
command = "npm run build"

[assets]
directory = ".output/public"

