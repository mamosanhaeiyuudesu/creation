name: Deploy Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/ai-tools/**'
      - 'package.json'
      - 'yarn.lock'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Preview to Cloudflare Workers

    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build:tools

      - name: Deploy (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/ai-tools
          command: deploy --env preview

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **プレビュー環境にデプロイしました**\n\nhttps://ai-tools-preview.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev\n\n> このコメントはPRのたびに自動投稿されます。'
            })
